services:
  - type: web
    name: fingerprint-university
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fingerprint-university-db
          property: connectionString
      - key: FP_PUBLIC_KEY
        sync: false          # you will paste this in the Render dashboard
      - key: FP_API_KEY
        sync: false
      - key: FP_SEALED_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true  # Render auto-generates a secure random string
      - key: APP_URL
        sync: false          # you will paste your Render URL here after first deploy

databases:
  - name: fingerprint-university-db
    plan: free
    databaseName: fp_university
    user: fp_user
