<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Fingerprint University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    [data-theme="dark"]{--bg:#08090d;--surface:#0e0f16;--card:#13141e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#ededee;--muted:#6c6d80;--accent:#f97316;--accent2:#fdba74;--green:#22c55e;--red:#ef4444}
    [data-theme="light"]{--bg:#f0f1f5;--surface:#fff;--card:#fff;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#0d0e14;--muted:#7a7b8e;--accent:#ea6b0e;--accent2:#c45a08;--green:#16a34a;--red:#dc2626}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;transition:background .2s,color .2s}
    header{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;background:var(--surface)}
    .logo{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px}
    .logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .wrap{width:100%;max-width:420px}
    h1{font-size:24px;font-weight:700;margin-bottom:6px}
    .sub{font-size:14px;color:var(--muted);margin-bottom:24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px}
    .field{margin-bottom:16px}
    .field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .field input{width:100%;padding:11px 14px;background:var(--surface);border:1.5px solid var(--border2);border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
    .field input:focus{border-color:var(--accent)}
    .btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
    .btn:hover{opacity:.88}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .msg{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
    .msg.success{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--green)}
    .msg.error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red)}
    .back{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
    .back a{color:var(--accent);text-decoration:none}
    .spinner{display:inline-block;width:12px;height:12px;border:1.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<header><a class="logo" href="/"><span class="logo-dot"></span>Fingerprint University</a></header>
<main>
  <div class="wrap">
    <h1>Set new password</h1>
    <p class="sub">Enter and confirm your new password below.</p>
    <div class="card">
      <div class="field">
        <label>New password</label>
        <input type="password" id="password" placeholder="At least 6 characters"/>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat password" onkeydown="if(event.key==='Enter') doReset()"/>
      </div>
      <button class="btn" id="btn" onclick="doReset()">Set new password</button>
      <div class="msg" id="msg"></div>
    </div>
    <p class="back"><a href="/">← Back to sign in</a></p>
  </div>
</main>
<script>
  const token = new URLSearchParams(location.search).get('token');
  if (!token) {
    document.getElementById('msg').textContent = 'Invalid reset link. Please request a new one.';
    document.getElementById('msg').className   = 'msg error';
    document.getElementById('msg').style.display = 'block';
    document.getElementById('btn').disabled    = true;
  }

  async function doReset() {
    const pass    = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const btn     = document.getElementById('btn');
    const msgEl   = document.getElementById('msg');
    msgEl.style.display = 'none';

    if (pass.length < 6) {
      msgEl.textContent   = 'Password must be at least 6 characters.';
      msgEl.className     = 'msg error';
      msgEl.style.display = 'block'; return;
    }
    if (pass !== confirm) {
      msgEl.textContent   = 'Passwords do not match.';
      msgEl.className     = 'msg error';
      msgEl.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Setting password…';

    const res  = await fetch('/api/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass }),
    }).then(r => r.json());

    if (res.ok) {
      msgEl.textContent   = 'Password updated! Redirecting to sign in…';
      msgEl.className     = 'msg success';
      msgEl.style.display = 'block';
      setTimeout(() => window.location.href = '/', 2000);
    } else {
      msgEl.textContent   = res.error;
      msgEl.className     = 'msg error';
      msgEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Set new password';
    }
  }
</script>
</body>
</html>
